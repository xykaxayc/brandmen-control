name: Build Android Player APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android-player/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'android-player/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "version=0.$COUNT.0" >> $GITHUB_OUTPUT
          echo "tag=v0.$COUNT.0" >> $GITHUB_OUTPUT

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;34.0.0'

      - name: Compile Java
        working-directory: android-player
        run: |
          mkdir -p classes
          javac --release 11 -classpath "$ANDROID_SDK_ROOT/platforms/android-33/android.jar" \
            -Xlint:-options -d classes \
            src/main/java/com/brandmen/ads/MediaServer.java \
            src/main/java/com/brandmen/ads/BootReceiver.java \
            src/main/java/com/brandmen/ads/DiscoveryListener.java \
            src/main/java/com/brandmen/ads/UpdateChecker.java \
            src/main/java/com/brandmen/ads/MainActivity.java

      - name: Convert to DEX
        working-directory: android-player
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/d8 \
            --min-api 21 \
            --lib "$ANDROID_SDK_ROOT/platforms/android-33/android.jar" \
            --output . \
            classes/com/brandmen/ads/*.class

      - name: Pack APK
        working-directory: android-player
        run: |
          mkdir -p out
          cp src/main/AndroidManifest.xml out/
          # If resources.arsc is missing, we might need to generate it or use a placeholder
          # For now, let's assume it's part of the standard build or provided in resources
          if [ -f resources/resources.arsc ]; then cp resources/resources.arsc out/; fi
          cp classes.dex out/
          cd out
          zip -r0q ../brandmen-unaligned.apk .
          cd ..
          $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -f 4 \
            brandmen-unaligned.apk brandmen-aligned.apk

      - name: Sign APK
        working-directory: android-player
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:brandmen123 \
            --key-pass pass:brandmen123 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out BrandmenAds.apk \
            brandmen-aligned.apk
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner verify -v BrandmenAds.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrandmenAds-APK
          path: android-player/BrandmenAds.apk
          retention-days: 30

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Build ${{ steps.ver.outputs.version }}"
          prerelease: true
          generate_release_notes: false
          files: android-player/BrandmenAds.apk
