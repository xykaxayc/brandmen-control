name: Build macOS

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'macos/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-macos.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'macos/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-macos.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: ver
        run: |
          git fetch --tags --force
          MAX=$(git tag -l 'v0.*.0' | sed -E 's/^v0\.([0-9]+)\.0$/\1/' | sort -n | tail -1)
          NEXT=$(( ${MAX:-0} + 1 ))
          echo "version=0.$NEXT.0" >> $GITHUB_OUTPUT
          echo "tag=v0.$NEXT.0" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      - name: Bundle FFmpeg
        run: |
          curl -L 'https://evermeet.cx/ffmpeg/getrelease/zip' -o ffmpeg.zip
          unzip -o ffmpeg.zip -d ffmpeg-dist
          mkdir -p build/macos/Build/Products/Release/brandmen_windows.app/Contents/MacOS/ffmpeg
          cp ffmpeg-dist/ffmpeg build/macos/Build/Products/Release/brandmen_windows.app/Contents/MacOS/ffmpeg/ffmpeg
          chmod +x build/macos/Build/Products/Release/brandmen_windows.app/Contents/MacOS/ffmpeg/ffmpeg
          codesign --force --deep --sign - --timestamp=none build/macos/Build/Products/Release/brandmen_windows.app
          codesign --verify --deep --strict build/macos/Build/Products/Release/brandmen_windows.app

      - name: Zip .app
        run: |
          cd build/macos/Build/Products/Release
          zip -ry ../../../../../BrandmenControl-macOS.zip brandmen_windows.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrandmenControl-macOS
          path: BrandmenControl-macOS.zip
          retention-days: 30

      - name: Create or update release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Build ${{ steps.ver.outputs.version }}"
          prerelease: true
          generate_release_notes: false
          files: BrandmenControl-macOS.zip
