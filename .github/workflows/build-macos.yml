name: Build macOS

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'macos/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-macos.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'macos/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-macos.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: ver
        run: |
          git fetch --tags --force
          MAX=$(git tag -l 'v0.*.0' | sed -E 's/^v0\.([0-9]+)\.0$/\1/' | sort -n | tail -1)
          NEXT=$(( ${MAX:-0} + 1 ))
          echo "version=0.$NEXT.0" >> $GITHUB_OUTPUT
          echo "tag=v0.$NEXT.0" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      # FFmpeg не меняется между сборками — кэшируем. Обновить → поднять -v1 → -v2.
      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg-cache
          key: ffmpeg-macos-v1

      - name: Download FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -L 'https://evermeet.cx/ffmpeg/getrelease/zip' -o ffmpeg.zip
          unzip -o ffmpeg.zip -d ffmpeg-dist
          mkdir -p ffmpeg-cache
          cp ffmpeg-dist/ffmpeg ffmpeg-cache/ffmpeg
          rm -rf ffmpeg.zip ffmpeg-dist

      - name: Bundle FFmpeg & sign
        run: |
          APP=build/macos/Build/Products/Release/brandmen_windows.app
          mkdir -p "$APP/Contents/MacOS/ffmpeg"
          cp ffmpeg-cache/ffmpeg "$APP/Contents/MacOS/ffmpeg/ffmpeg"
          chmod +x "$APP/Contents/MacOS/ffmpeg/ffmpeg"
          codesign --force --deep --sign - --timestamp=none "$APP"
          codesign --verify --deep --strict "$APP"

      - name: Zip .app
        run: |
          cd build/macos/Build/Products/Release
          zip -ry ../../../../../BrandmenControl-macOS.zip brandmen_windows.app

      # .dmg для установки перетаскиванием в Applications (zip оставляем — на
      # него опирается встроенное автообновление).
      - name: Build .dmg
        run: |
          APP=build/macos/Build/Products/Release/brandmen_windows.app
          STAGE=dmg-stage
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Brandmen Control" -srcfolder "$STAGE" \
            -ov -format UDZO BrandmenControl-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrandmenControl-macOS
          path: |
            BrandmenControl-macOS.zip
            BrandmenControl-macOS.dmg
          retention-days: 30

      - name: Create or update release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Build ${{ steps.ver.outputs.version }}"
          prerelease: true
          generate_release_notes: false
          files: |
            BrandmenControl-macOS.zip
            BrandmenControl-macOS.dmg
