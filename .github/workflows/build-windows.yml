name: Build Windows

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'windows/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'windows/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: ver
        shell: bash
        run: |
          git fetch --tags --force
          MAX=$(git tag -l 'v0.*.0' | sed -E 's/^v0\.([0-9]+)\.0$/\1/' | sort -n | tail -1)
          NEXT=$(( ${MAX:-0} + 1 ))
          echo "version=0.$NEXT.0" >> $GITHUB_OUTPUT
          echo "tag=v0.$NEXT.0" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      # FFmpeg и ADB не меняются между сборками — кэшируем, чтобы не качать
      # каждый раз (раньше это занимало ~6 мин и ~1 мин соответственно).
      # Чтобы обновить бинарник — поднять версию в ключе кэша (…-v1 → -v2).
      # v2: помимо ffmpeg.exe кэшируем и ffprobe.exe (нужен для проверки кодека
      # внутри .mp4). Обновление бинарников — поднять версию ключа (…-v2 → -v3).
      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: tools-cache/ffmpeg
          key: ffmpeg-win64-gpl-v2

      - name: Download FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip' `
            -OutFile 'ffmpeg.zip' -UseBasicParsing
          7z x ffmpeg.zip -offmpeg-dist -y
          New-Item -ItemType Directory -Force -Path 'tools-cache\ffmpeg'
          $ffmpeg = Get-ChildItem -Path 'ffmpeg-dist' -Filter 'ffmpeg.exe' -Recurse | Select-Object -First 1
          Copy-Item $ffmpeg.FullName 'tools-cache\ffmpeg\ffmpeg.exe'
          $ffprobe = Get-ChildItem -Path 'ffmpeg-dist' -Filter 'ffprobe.exe' -Recurse | Select-Object -First 1
          Copy-Item $ffprobe.FullName 'tools-cache\ffmpeg\ffprobe.exe'
          Remove-Item 'ffmpeg.zip','ffmpeg-dist' -Recurse -Force

      - name: Cache ADB platform-tools
        id: cache-adb
        uses: actions/cache@v4
        with:
          path: tools-cache/platform-tools
          key: adb-platform-tools-v1

      - name: Download ADB platform-tools
        if: steps.cache-adb.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri 'https://dl.google.com/android/repository/platform-tools-latest-windows.zip' `
            -OutFile 'platform-tools.zip' -UseBasicParsing
          7z x platform-tools.zip -otools-cache -y
          Remove-Item 'platform-tools.zip'

      - name: Bundle tools into release
        shell: powershell
        run: |
          $rel = 'build\windows\x64\runner\Release'
          New-Item -ItemType Directory -Force -Path "$rel\ffmpeg"
          Copy-Item 'tools-cache\ffmpeg\ffmpeg.exe' "$rel\ffmpeg\ffmpeg.exe" -Force
          Copy-Item 'tools-cache\ffmpeg\ffprobe.exe' "$rel\ffmpeg\ffprobe.exe" -Force
          Copy-Item 'tools-cache\platform-tools' "$rel\platform-tools" -Recurse -Force

      - name: Zip release
        run: |
          cd build\windows\x64\runner\Release
          7z a -tzip ..\..\..\..\..\BrandmenControl-Windows.zip .
        shell: cmd

      # Установщик в один клик (ставит все файлы вместе, без матрёшки/«exe без
      # DLL»). Zip оставляем — на него опирается встроенное автообновление.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ steps.ver.outputs.version }}" `
            windows\installer.iss
          Move-Item windows\BrandmenControl-Setup.exe .\BrandmenControl-Setup.exe -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrandmenControl-Windows
          path: |
            BrandmenControl-Windows.zip
            BrandmenControl-Setup.exe
          retention-days: 30

      - name: Create or update release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Build ${{ steps.ver.outputs.version }}"
          prerelease: true
          generate_release_notes: false
          files: |
            BrandmenControl-Windows.zip
            BrandmenControl-Setup.exe
