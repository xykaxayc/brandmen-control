name: Build Windows

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'windows/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: ver
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "version=0.$COUNT.0" >> $GITHUB_OUTPUT
          echo "tag=v0.$COUNT.0" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      - name: Bundle ADB platform-tools
        shell: powershell
        run: |
          Invoke-WebRequest -Uri 'https://dl.google.com/android/repository/platform-tools-latest-windows.zip' `
            -OutFile 'platform-tools.zip' -UseBasicParsing
          Expand-Archive -Path 'platform-tools.zip' `
            -DestinationPath 'build\windows\x64\runner\Release' -Force
          Remove-Item 'platform-tools.zip'

      - name: Zip release
        run: |
          cd build\windows\x64\runner\Release
          7z a -tzip ..\..\..\..\..\BrandmenControl-Windows.zip .
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrandmenControl-Windows
          path: BrandmenControl-Windows.zip
          retention-days: 30

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Build ${{ steps.ver.outputs.version }}"
          prerelease: true
          generate_release_notes: false
          files: BrandmenControl-Windows.zip
